name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron:  '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  generate-version-number:
    runs-on: ubuntu-latest

    outputs:
      version_number: ${{ steps.version.outputs.version_number }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Checkout required submodules
      run: |
        git submodule update --init --depth 1 scripts/build-tools
        git submodule update --init --depth 1 scripts/changes

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Generate version and build numbers
      id: version
      run: |
        source scripts/environment.sh
        VERSION_NUMBER=`changes version`
        BUILD_NUMBER=`build-tools generate-build-number`
        echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
        echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  build:

    name: build
    runs-on: inseven-macos-26

    needs:
    - generate-version-number

    env:
      VERSION_NUMBER: ${{ needs.generate-version-number.outputs.version_number }}
      BUILD_NUMBER: ${{ needs.generate-version-number.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Build and test
      id: build
      env:
        DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.PERSONAL_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
        DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.PERSONAL_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}

        APPLE_API_KEY_BASE64: ${{ secrets.PERSONAL_APPLE_API_KEY_BASE64 }}
        APPLE_API_KEY_ISSUER_ID: ${{ secrets.PERSONAL_APPLE_API_KEY_ISSUER_ID }}
        APPLE_API_KEY_ID: ${{ secrets.PERSONAL_APPLE_API_KEY_ID }}

        SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}

        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      run: |
        scripts/build.sh

    - name: Archive the build directory
      uses: actions/upload-artifact@v6
      with:
        name: tinyboard-macos
        path: build
        if-no-files-found: error

  firmware-build:

    name: firmware-build
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Checkout required submodules
      run: git submodule update --init --depth 1 firmware/dependencies/TinyUSB_Mouse_and_Keyboard

    - name: Build firmware
      run: scripts/build-firmware.sh

    - name: Archive the firmware
      uses: actions/upload-artifact@v6
      with:
        name: firmware
        path: build/firmware/firmware.ino.*
        if-no-files-found: error

  release:

    runs-on: ubuntu-latest

    needs:
    - generate-version-number
    - build
    - firmware-build

    outputs:
      released: ${{ steps.release.outputs.released }}

    env:
      VERSION_NUMBER: ${{ needs.generate-version-number.outputs.version_number }}
      BUILD_NUMBER: ${{ needs.generate-version-number.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Checkout required submodules
      run: |
        git submodule update --init --depth 1 scripts/build-tools
        git submodule update --init --depth 1 scripts/changes

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Download the build artifacts
      uses: actions/download-artifact@v6
      with:
        name: tinyboard-macos
        path: artifacts/tinyboard-macos

    - name: Publish release
      id: release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE: ${{ github.ref == 'refs/heads/main' }}
      run: scripts/release.sh

    - name: Archive the binaries
      uses: actions/upload-artifact@v6
      with:
        name: build
        path: build/*
        if-no-files-found: error

  website-build:

    needs: build

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        lfs: true

    - name: Checkout required submodules
      run: |
        git submodule update --init --depth 1 scripts/build-tools
        git submodule update --init --depth 1 scripts/changes
        git submodule update --init --depth 1 docs/_theme

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Build website
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        scripts/build-website.sh
        chmod -v -R +rX "_site/"

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5

  website-deploy:

    needs: website-build
    if: ${{ github.ref == 'refs/heads/main' }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  sparkle-update:
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}

    runs-on: ubuntu-latest
    steps:

    - name: Update Sparkle archives
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets._GITHUB_ACCESS_TOKEN }}
        repository: inseven/sparkle-archives
        event-type: build
